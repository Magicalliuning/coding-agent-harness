name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust-checks:
    name: Rust workspace checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: harness_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d harness_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HARNESS_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/harness_test
      RUST_TEST_THREADS: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --workspace

      - name: Build workspace
        run: cargo build --workspace

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
