services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
      POSTGRES_DB: harness
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness -d harness"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - harness-postgres-data:/var/lib/postgresql/data

volumes:
  harness-postgres-data:
