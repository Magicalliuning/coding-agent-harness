apiVersion: v1
kind: Namespace
metadata:
  name: coding-agent-harness-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: coding-agent-harness-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harness-postgres
  template:
    metadata:
      labels:
        app: harness-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          env:
            - name: POSTGRES_USER
              value: harness
            - name: POSTGRES_PASSWORD
              value: harness
            - name: POSTGRES_DB
              value: harness
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - harness
                - -d
                - harness
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: coding-agent-harness-dev
spec:
  selector:
    app: harness-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
